  <text x="105" y="45" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="30" fill="currentColor" letter-spacing="-0.02em">FINANZAS</text>
  <text x="105" y="75" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="30" fill="currentColor" letter-spacing="-0.02em">PERSONALES</text>
  <text x="108" y="92" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="9" fill="currentColor" letter-spacing="0.06em" opacity="0.7">GESTIONA TU DINERO CON INTELIGENCIA</text>
