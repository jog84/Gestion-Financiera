<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dollar sign vertical bar -->
  <line x1="36" y1="6" x2="36" y2="78" stroke="currentColor" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Dollar S-curve: one continuous S path -->
  <path d="M50,18 C62,18 66,26 66,32 C66,40 54,43 42,47 C30,51 24,56 24,64 C24,72 30,78 42,78 C50,78 56,74 60,70"
        fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main large arrow (lower-left to upper-right) -->
  <line x1="22" y1="88" x2="82" y2="18" stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/>
  <polygon points="82,18 60,22 78,40" fill="currentColor"/>

  <!-- Secondary arrow (thinner, offset right) -->
  <line x1="48" y1="92" x2="96" y2="42" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <polygon points="96,42 80,48 90,62" fill="currentColor" opacity="0.5"/>

  <!-- Bar chart ascending (bottom right) -->
  <rect x="68" y="76" width="5" height="10" rx="1.5" fill="currentColor" opacity="0.4"/>
  <rect x="75" y="70" width="5" height="16" rx="1.5" fill="currentColor" opacity="0.55"/>
  <rect x="82" y="63" width="5" height="23" rx="1.5" fill="currentColor" opacity="0.7"/>
  <rect x="89" y="55" width="5" height="31" rx="1.5" fill="currentColor" opacity="0.85"/>
</svg>
